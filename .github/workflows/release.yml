name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Check release version alignment
        run: python scripts/check_release_versions.py

      - name: Ensure tag matches VERSION
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(cat VERSION | tr -d '\n' | tr -d '\r')"
          if [ "v${VERSION}" != "${TAG}" ]; then
            echo "[ERROR] Git tag (${TAG}) does not match VERSION (${VERSION})"
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Automated release for ${GITHUB_REF_NAME}"
