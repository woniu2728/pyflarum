services:
  db:
    image: postgres:15-alpine
    container_name: bias_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bias
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - bias_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bias_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - bias_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bias_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py init_groups &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=django-insecure-docker-dev-key-change-in-production
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - DB_MODE=postgres
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=bias
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - USE_REDIS=True
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
      - CORS_ALLOWED_ORIGINS=http://localhost,http://127.0.0.1
      - FRONTEND_URL=http://localhost
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bias_network

  frontend:
    image: node:20-alpine
    container_name: bias_frontend
    restart: unless-stopped
    working_dir: /app/frontend
    command: >
      sh -c "npm install &&
             npm run build &&
             tail -f /dev/null"
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/frontend/dist/index.html && test -f /app/frontend/dist/admin.html"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - bias_network

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bias_celery
    restart: unless-stopped
    command: celery -A config worker -l info
    volumes:
      - .:/app
    environment:
      - DEBUG=False
      - SECRET_KEY=django-insecure-docker-dev-key-change-in-production
      - DB_MODE=postgres
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=bias
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - USE_REDIS=True
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bias_network

  nginx:
    image: nginx:alpine
    container_name: bias_nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - .:/app:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    ports:
      - "80:80"
    depends_on:
      web:
        condition: service_started
      frontend:
        condition: service_healthy
    networks:
      - bias_network

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  frontend_node_modules:

networks:
  bias_network:
    driver: bridge
